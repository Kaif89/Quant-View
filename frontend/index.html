<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantView — Quant Research Platform</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <meta name="description" content="AI-powered quantitative finance research platform with regression overlays, real-time data, and portfolio analytics." />
    <meta name="author" content="QuantView" />
    <!-- Prevent flash of light theme by reading localStorage before first paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('quantview-theme');
          var theme = saved ? saved : 'dark';
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
