version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Use an in-memory H2 database by default for easy testing
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:quantviewdb
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # Point the backend to the python engine container
      - PYTHON_SERVICE_URL=http://python-engine:5000
      - PYTHON_ML_URL=http://python-engine:5000
    depends_on:
      - python-engine

  python-engine:
    build:
      context: .
      dockerfile: python-engine/Dockerfile
    ports:
      - "5000:5000"
